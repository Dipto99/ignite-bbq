<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orders | Ignite BBQ Admin</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .admin-wrap {
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 24px 100px;
    }
    .admin-login {
      max-width: 380px;
      margin: 120px auto;
      background: rgba(12, 5, 2, 0.92);
      border: 1px solid rgba(255, 112, 28, 0.38);
      border-radius: 20px;
      padding: 32px;
      text-align: center;
    }
    .admin-login input {
      width: 100%;
      padding: 12px 14px;
      margin: 16px 0;
      border-radius: 10px;
      border: 1px solid rgba(255, 122, 26, 0.35);
      background: rgba(255, 255, 255, 0.04);
      color: #fff1dc;
      font: inherit;
    }
    .admin-login button, .admin-refresh {
      padding: 12px 24px;
      border-radius: 999px;
      border: 1px solid rgba(255, 145, 71, 0.22);
      background: linear-gradient(180deg, #d14d16, #8d2407);
      color: #fff4e8;
      font: inherit;
      cursor: pointer;
    }
    .admin-error {
      color: #ff9b4a;
      margin-top: 10px;
      font-size: 0.9rem;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 24px;
      background: rgba(12, 5, 2, 0.7);
      border-radius: 14px;
      overflow: hidden;
    }
    th, td {
      padding: 12px 14px;
      text-align: left;
      border-bottom: 1px solid rgba(255, 122, 26, 0.18);
      font-size: 0.92rem;
    }
    th {
      color: #ff9b4a;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-size: 0.78rem;
    }
    .batch-heading {
      margin-top: 40px;
      color: #f4d09a;
    }
    .top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }
    .hidden { display: none; }
  </style>
</head>
<body class="order-page">

  <div id="adminLogin" class="admin-login">
    <h2>Admin Login</h2>
    <p style="margin-top:10px; color:#caa77c;">Enter your admin key to view orders.</p>
    <input type="password" id="adminKeyInput" placeholder="Admin key" />
    <br />
    <button id="adminLoginBtn">View Orders</button>
    <p id="adminLoginError" class="admin-error hidden"></p>
  </div>

  <main id="adminWrap" class="admin-wrap hidden">
    <p style="color:#caa77c; margin-bottom: 8px;">Only orders that have actually been paid for show up here. Spots free up automatically every week.</p>
    <div class="top-row">
      <h1>Ignite BBQ — Orders</h1>
      <div>
        <label style="margin-right: 14px; color:#caa77c;">
          <input type="checkbox" id="showAllToggle" /> Show all weeks
        </label>
        <button class="admin-refresh" id="refreshBtn">Refresh</button>
      </div>
    </div>
    <div id="ordersContainer"></div>
  </main>

  <script>
    const loginBox = document.getElementById("adminLogin");
    const wrap = document.getElementById("adminWrap");
    const keyInput = document.getElementById("adminKeyInput");
    const loginBtn = document.getElementById("adminLoginBtn");
    const loginError = document.getElementById("adminLoginError");
    const ordersContainer = document.getElementById("ordersContainer");
    const refreshBtn = document.getElementById("refreshBtn");
    const showAllToggle = document.getElementById("showAllToggle");

    let adminKey = "";

    async function loadOrders() {
      loginError.classList.add("hidden");
      ordersContainer.innerHTML = "<p>Loading…</p>";

      const showAll = showAllToggle.checked;
      const url = `/.netlify/functions/get-orders${showAll ? "?all=true" : ""}`;

      try {
        const res = await fetch(url, {
          headers: { "x-admin-key": adminKey },
        });

        let data;
        try {
          data = await res.json();
        } catch {
          // The response wasn't JSON at all — usually means the function
          // itself couldn't be reached (e.g. a 404 page came back instead).
          throw new Error(
            `Unexpected response from the server (status ${res.status}). The get-orders function may not be deployed.`
          );
        }

        if (!res.ok) {
          loginBox.classList.remove("hidden");
          wrap.classList.add("hidden");
          loginError.textContent = data.detail ? `${data.error} (${data.detail})` : (data.error || "Could not load orders.");
          loginError.classList.remove("hidden");
          return;
        }

        loginBox.classList.add("hidden");
        wrap.classList.remove("hidden");
        renderBatches(data.batches, data.maxBookings);
      } catch (err) {
        console.error("Admin loadOrders failed:", err);
        loginBox.classList.remove("hidden");
        wrap.classList.add("hidden");
        loginError.textContent = err.message || "Could not reach the server.";
        loginError.classList.remove("hidden");
      }
    }

    function renderBatches(batches, maxBookings) {
      if (!batches || batches.length === 0) {
        ordersContainer.innerHTML = "<p>No orders yet.</p>";
        return;
      }

      ordersContainer.innerHTML = batches
        .map((batch) => {
          const rows = batch.orders
            .map(
              (o) => `
              <tr>
                <td>${escapeHtml(o.orderNumber)}</td>
                <td>${escapeHtml(o.name)}</td>
                <td>${escapeHtml(o.email)}</td>
                <td>${escapeHtml(o.pickupTime)}</td>
                <td>${o.paid ? "✅ Paid" : "—"}</td>
                <td>${new Date(o.createdAt).toLocaleString()}</td>
              </tr>`
            )
            .join("");

          const capacityLabel = maxBookings
            ? `${batch.orders.length} of ${maxBookings} spots booked`
            : `${batch.orders.length} order(s)`;

          return `
            <h3 class="batch-heading">Pickup ${escapeHtml(batch.pickupDate)} — ${capacityLabel}</h3>
            <table>
              <thead>
                <tr>
                  <th>Order #</th><th>Name</th><th>Email</th><th>Pickup Time</th><th>Paid</th><th>Booked At</th>
                </tr>
              </thead>
              <tbody>${rows || `<tr><td colspan="6">No orders yet.</td></tr>`}</tbody>
            </table>
          `;
        })
        .join("");
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    loginBtn.addEventListener("click", () => {
      adminKey = keyInput.value.trim();
      if (!adminKey) return;
      loadOrders();
    });

    keyInput.addEventListener("keydown", (e) => {
      if (e.key === "Enter") loginBtn.click();
    });

    refreshBtn.addEventListener("click", loadOrders);
    showAllToggle.addEventListener("change", loadOrders);
  </script>
</body>
</html>
